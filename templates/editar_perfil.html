{% extends "base.html" %}

{% block content %}

<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-lg-6">

      <div class="card shadow-sm border-0 p-4">

        <h3 class="mb-4 text-center">
          Editar perfil
        </h3>

        <form method="POST">

          <div class="mb-3">
            <label class="form-label">Nombre</label>

            <input
              type="text"
              name="nombre"
              class="form-control"
              value="{{ usuario.nombre_cliente }}"
              required
            >
          </div>


          <div class="mb-3">
            <label class="form-label">Apellidos</label>

            <input
              type="text"
              name="apellidos"
              class="form-control"
              value="{{ usuario.apellidos_cliente }}"
            >
          </div>


          <div class="mb-3">
            <label class="form-label">Email</label>

            <input
              type="email"
              name="email"
              class="form-control"
              value="{{ usuario.email }}"
              required
            >
          </div>


          <div class="mb-3">
            <label class="form-label">Teléfono</label>

            <input
              type="text"
              name="telefono"
              class="form-control"
              value="{{ usuario.telefono }}"
            >
          </div>


          <div class="d-grid mb-3">

            <button class="btn btn-dark">
              Guardar cambios
            </button>

          </div>

        </form>

        <hr>

        <div class="text-center">

          <h5 class="mb-3">
            Direcciones
          </h5>

          <a
            href="{{ url_for('direcciones') }}"
            class="btn btn-outline-dark btn-sm"
          >
            Gestionar direcciones
          </a>

        </div>

      </div>

    </div>

  </div>

</div>

{% endblock %}
