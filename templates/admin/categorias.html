{% extends "base.html" %}
{% block content %}

<div class="admin-container">

    <div class="admin-header">
        <h2>Gestión de Categorías</h2>
        <a href="{{ url_for('admin_nueva_categoria') }}" class="btn-admin-primary">
            + Nueva Categoría
        </a>
        <a href="{{ url_for('admin_panel') }}" class="btn-admin-primary btn-back">
            <span class="btn-icon">←</span>
            <span>Atrás</span>
        </a>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Productos</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for categoria in categorias %}
            <tr>
                <td>{{ categoria.id_categoria }}</td>
                <td>{{ categoria.nombre_categoria }}</td>
                <td>{{ categoria.productos|length }}</td>
                <td>
                    <a href="{{ url_for('admin_editar_categoria', id=categoria.id_categoria) }}">Editar</a>
                    |
                    <a href="{{ url_for('admin_eliminar_categoria', id=categoria.id_categoria) }}"
                       onclick="return confirm('¿Seguro que quieres eliminar esta categoría?')">
                        Eliminar
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
