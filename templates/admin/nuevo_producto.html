{% extends "base.html" %}

{% block content %}
<div class="form-container">

    <h2>Nuevo Producto</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="form-grid">

            <!-- COLUMNA IZQUIERDA -->
            <div class="columna">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="nombre_producto" required>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea name="descripcion" required></textarea>
                </div>

                <div class="form-group">
                    <label>Precio (€)</label>
                    <input type="number" step="0.01" name="precio" required>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock" required>
                </div>

            </div>

            <!-- COLUMNA CENTRO -->
            <div class="columna categorias-group">

                <label>Categorías</label>

                <div class="categorias-list">
                    {% for categoria in categorias %}
                    <label class="categoria-item">
                        <input type="checkbox"
                               name="categorias"
                               value="{{ categoria.id_categoria }}">
                        {{ categoria.nombre_categoria }}
                    </label>
                    {% endfor %}
                </div>

            </div>

            <!-- COLUMNA DERECHA -->
            <div class="columna">

                <div class="form-group">
                    <label>Altura (cm)</label>
                    <input type="number" step="0.01" name="altura" required>
                </div>

                <div class="form-group">
                    <label>Ancho (cm)</label>
                    <input type="number" step="0.01" name="ancho" required>
                </div>

                <div class="form-group">
                    <label>Fondo (cm)</label>
                    <input type="number" step="0.01" name="fondo" required>
                </div>

                <!-- NUEVA SECCIÓN IMÁGENES -->
                <div class="form-group">
                    <label>Imágenes del producto</label>
                    <input type="file"
                           name="imagenes"
                           multiple
                           accept="image/*">
                </div>

                <button type="submit" class="btn-guardar">
                    Guardar producto
                </button>

            </div>

        </div>

    </form>

</div>
{% endblock %}
