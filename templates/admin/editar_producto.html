{% extends "base.html" %}

{% block content %}

<div class="form-container">
    <h2>Editar Producto</h2>

    <form method="POST" enctype="multipart/form-data">
        <div class="form-grid">

            <!-- COLUMNA IZQUIERDA -->
            <div class="columna">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="nombre_producto"
                           value="{{ producto.nombre_producto }}" required>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea name="descripcion" required>{{ producto.descripcion }}</textarea>
                </div>

                <div class="form-group">
                    <label>Precio (€)</label>
                    <input type="number" step="0.01" name="precio"
                           value="{{ producto.precio }}" required>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock"
                           value="{{ producto.stock }}" required>
                </div>
            </div>

            <!-- COLUMNA CENTRAL -->
            <div class="columna categorias-group">
                <label>Categorías</label>

                <div class="categorias-list">
                    {% for categoria in categorias %}
                        <label class="categoria-item">
                            <input type="checkbox"
                                   name="categorias"
                                   value="{{ categoria.id_categoria }}"
                                   {% if categoria in producto.categorias %}checked{% endif %}>
                            {{ categoria.nombre_categoria }}
                        </label>
                    {% endfor %}
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="columna">
                <div class="form-group">
                    <label>Altura (cm)</label>
                    <input type="number" step="0.01" name="altura"
                           value="{{ producto.altura }}" required>
                </div>

                <div class="form-group">
                    <label>Ancho (cm)</label>
                    <input type="number" step="0.01" name="ancho"
                           value="{{ producto.ancho }}" required>
                </div>

                <div class="form-group">
                    <label>Fondo (cm)</label>
                    <input type="number" step="0.01" name="fondo"
                           value="{{ producto.fondo }}" required>
                </div>

                <button type="submit" class="btn-guardar">
                    Guardar cambios
                </button>
            </div>

        </div>
        <hr>

<h3>Imágenes del producto</h3>

<div class="imagenes-grid">
    {% for imagen in producto.imagenes %}
        <div class="imagen-card">

            <img src="{{ url_for('static', filename=imagen.ruta_imagen) }}" width="140">

            <div class="imagen-opciones">
                <label>
                    <input type="radio"
                           name="imagen_principal"
                           value="{{ imagen.id_imagen }}"
                           {% if imagen.es_principal %}checked{% endif %}>
                    Principal
                </label>

                <label>
                    <input type="checkbox"
                           name="eliminar_imagen"
                           value="{{ imagen.id_imagen }}">
                    Eliminar
                </label>
            </div>

        </div>
    {% endfor %}
</div>

<hr>

<h4>Añadir nuevas imágenes</h4>
<input type="file" name="imagenes" multiple>
    </form>
</div>

{% endblock %}
