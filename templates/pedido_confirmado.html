{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="card shadow-lg border-0 text-center p-5" style="max-width: 500px; width: 100%; border-radius: 20px;">

    <div class="mb-4">
      <div style="font-size: 60px;">✅</div>
      <h2 class="mt-3">¡Pedido confirmado!</h2>
      <p class="text-muted">Gracias por confiar en WoodPau</p>
    </div>

    <hr>

    <div class="my-4">
      <p class="mb-1"><strong>Número de pedido</strong></p>
      <p class="fs-5">#{{ pedido.id_pedido }}</p>

      <p class="mb-1 mt-3"><strong>Total pagado</strong></p>
      <p class="fs-4 fw-bold">{{ pedido.total }} €</p>
    </div>

    <a href="{{ url_for('home') }}" class="btn btn-dark mt-3">
      Volver al inicio
    </a>

  </div>

</div>

{% endblock %}
